name: Build SDK Native

on:
  push:
    branches: [main]
    paths:
      - 'sdks/**'
      - '.github/workflows/sdk-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdks/**'
      - '.github/workflows/sdk-build.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (GNU libc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: false

          # Linux ARM64 (GNU libc) - cross compile
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: false
            cross: true

          # Linux x86_64 (musl) - cross compile
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: false
            cross: true

          # Linux ARM64 (musl) - cross compile
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: false
            cross: true

          # macOS x86_64
          - os: macos-13  # x86_64 runner
            target: x86_64-apple-darwin
            docker: false

          # macOS ARM64 (Apple Silicon)
          - os: macos-14  # ARM64 runner
            target: aarch64-apple-darwin
            docker: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: sdks/rust/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install cross-compilation tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            # Install musl cross-compiler for ARM64
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdks/rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install dependencies
        working-directory: sdks/rust
        run: npm install

      - name: Build native addon
        working-directory: sdks/rust
        env:
          # Set linker for cross-compilation
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: |
          npm run build -- --target ${{ matrix.target }}

      - name: List built artifacts
        working-directory: sdks/rust
        run: ls -la *.node || echo "No .node files found"

      - name: Run tests (native platform only)
        if: ${{ !matrix.cross }}
        working-directory: sdks/rust
        run: npm test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: sdks/rust/*.node
          if-no-files-found: error

  # Job to run TypeScript SDK tests
  test-typescript:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Linux x86_64 bindings
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: sdks/rust/

      - name: Install native SDK dependencies
        working-directory: sdks/rust
        run: npm install

      - name: Install TypeScript SDK dependencies
        working-directory: sdks/node
        run: npm install

      - name: Build TypeScript SDK
        working-directory: sdks/node
        run: npm run build

      - name: Run TypeScript SDK tests
        working-directory: sdks/node
        run: npm test

  # Aggregate all bindings for publishing
  publish-ready:
    name: Collect All Binaries
    runs-on: ubuntu-latest
    needs: [build, test-typescript]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -name "*.node" -type f | while read f; do
            echo "  $f"
            ls -lh "$f"
          done

      - name: Collect binaries
        run: |
          mkdir -p sdks/rust/npm
          for dir in artifacts/bindings-*; do
            target=$(basename "$dir" | sed 's/bindings-//')
            echo "Processing $target..."
            cp "$dir"/*.node sdks/rust/npm/ || true
          done
          ls -la sdks/rust/npm/

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-native-all-platforms
          path: sdks/rust/npm/
          retention-days: 30
