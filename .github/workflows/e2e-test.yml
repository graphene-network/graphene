name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: 'Test timeout in seconds'
        required: false
        default: '300'

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: opencapsule_node=info,opencapsule_worker=info
  FIRECRACKER_VERSION: "1.11.0"

# Required because kernel-build.yml's release job declares contents: write
# The release job won't run (only triggers on main branch push), but GitHub
# validates permissions at parse time
permissions:
  contents: write

jobs:
  # Build kernels first
  build-kernels:
    uses: ./.github/workflows/kernel-build.yml
    with:
      runtime: ''
      version: ''

  e2e-test:
    name: E2E Tests (Linux)
    needs: build-kernels
    runs-on: ubicloud-standard-8
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup system dependencies
        id: system-setup
        uses: ./.github/actions/setup-system

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          solana-test-validator --version

      - name: Setup Solana keypair
        run: |
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json
          solana config set --url http://localhost:8899
          echo "Keypair created at ~/.config/solana/id.json"

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli
          anchor --version

      - name: Download kernel artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/kernels
          pattern: '*-x86_64'
          merge-multiple: true

      - name: Setup kernel cache
        run: |
          mkdir -p $HOME/.opencapsule/cache/kernels
          if [ -d /tmp/kernels ] && [ "$(ls -A /tmp/kernels 2>/dev/null)" ]; then
            echo "Downloaded kernels:"
            find /tmp/kernels -type f
            # Move kernel binaries to cache
            find /tmp/kernels -type f -name '*_fc-x86_64' -exec mv {} $HOME/.opencapsule/cache/kernels/ \;
            echo "Kernels in cache:"
            ls -la $HOME/.opencapsule/cache/kernels/
          else
            echo "⚠️ No kernel artifacts found"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-
            ${{ runner.os }}-cargo-

      - name: Cache SDK native build
        uses: actions/cache@v4
        with:
          path: |
            sdks/node/native/target
          key: ${{ runner.os }}-sdk-native-${{ hashFiles('sdks/node/native/Cargo.lock', 'sdks/node/native/src/**') }}
          restore-keys: |
            ${{ runner.os }}-sdk-native-

      - name: Build opencapsule-worker binary
        run: cargo build --bin opencapsule-worker --release
        working-directory: crates/node

      - name: Install root dependencies
        run: bun install

      - name: Build OpenCapsule Anchor program
        working-directory: programs/opencapsule
        run: |
          anchor build
          echo "Program built at:"
          ls -la target/deploy/

      - name: Install native SDK dependencies
        working-directory: sdks/node/native
        run: bun install

      - name: Build native SDK
        working-directory: sdks/node/native
        run: bun run build

      - name: Install TypeScript SDK dependencies
        working-directory: sdks/node
        run: bun install

      - name: Build TypeScript SDK
        working-directory: sdks/node
        run: bun run build

      - name: Run Rust E2E tests
        run: |
          export OPENCAPSULE_KERNEL_CACHE="$HOME/.opencapsule/cache/kernels"
          echo "Kernel cache path: $OPENCAPSULE_KERNEL_CACHE"
          ls -la "$OPENCAPSULE_KERNEL_CACHE" || echo "Kernel cache directory is empty or doesn't exist"
          cargo test -p opencapsule_node --features e2e-tests

      - name: Run TypeScript E2E tests
        working-directory: sdks/node
        run: |
          export OPENCAPSULE_KERNEL_CACHE="$HOME/.opencapsule/cache/kernels"
          echo "Kernel cache path: $OPENCAPSULE_KERNEL_CACHE"
          ls -la "$OPENCAPSULE_KERNEL_CACHE" || echo "Kernel cache directory is empty or doesn't exist"
          bun test ./tests/*.e2e.test.ts --timeout ${{ inputs.timeout_seconds }}000
        env:
          OPENCAPSULE_WORKER_BINARY: ${{ github.workspace }}/target/release/opencapsule-worker

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            sdks/node/.opencapsule-test-*
            /tmp/opencapsule-test-*
          if-no-files-found: ignore
          retention-days: 7
