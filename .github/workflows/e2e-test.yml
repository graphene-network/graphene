name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: 'Test timeout in seconds'
        required: false
        default: '300'

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: monad_node=info,graphene_worker=info
  FIRECRACKER_VERSION: "1.11.0"

# Required because kernel-build.yml's release job declares contents: write
# The release job won't run (only triggers on main branch push), but GitHub
# validates permissions at parse time
permissions:
  contents: write

jobs:
  # Build kernels first
  build-kernels:
    uses: ./.github/workflows/kernel-build.yml
    with:
      runtime: ''
      version: ''

  e2e-test:
    name: E2E Tests (Linux)
    needs: build-kernels
    runs-on: ubicloud-standard-8
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Check KVM availability
        id: kvm
        run: |
          if [ -e /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "✅ KVM is available"
            ls -la /dev/kvm
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ KVM is not available"
          fi

      - name: Install system dependencies
        if: steps.kvm.outputs.available == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs

      - name: Install Solana CLI
        if: steps.kvm.outputs.available == 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          solana-test-validator --version

      - name: Install Anchor CLI
        if: steps.kvm.outputs.available == 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli
          anchor --version

      - name: Install Firecracker
        if: steps.kvm.outputs.available == 'true'
        run: |
          curl -fsSL "https://github.com/firecracker-microvm/firecracker/releases/download/v${FIRECRACKER_VERSION}/firecracker-v${FIRECRACKER_VERSION}-x86_64.tgz" -o firecracker.tgz
          tar -xzf firecracker.tgz
          sudo mv release-v${FIRECRACKER_VERSION}-x86_64/firecracker-v${FIRECRACKER_VERSION}-x86_64 /usr/local/bin/firecracker
          sudo chmod +x /usr/local/bin/firecracker
          firecracker --version

      - name: Download kernel artifacts
        if: steps.kvm.outputs.available == 'true'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/kernels
          pattern: '*-x86_64'
          merge-multiple: true

      - name: Setup kernel cache
        if: steps.kvm.outputs.available == 'true'
        run: |
          mkdir -p $HOME/.graphene/cache/kernels
          if [ -d /tmp/kernels ] && [ "$(ls -A /tmp/kernels 2>/dev/null)" ]; then
            echo "Downloaded kernels:"
            find /tmp/kernels -type f
            # Move kernel binaries to cache
            find /tmp/kernels -type f -name '*_fc-x86_64' -exec mv {} $HOME/.graphene/cache/kernels/ \;
            echo "Kernels in cache:"
            ls -la $HOME/.graphene/cache/kernels/
          else
            echo "⚠️ No kernel artifacts found"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-
            ${{ runner.os }}-cargo-

      - name: Cache SDK native build
        uses: actions/cache@v4
        with:
          path: |
            sdks/node/native/target
          key: ${{ runner.os }}-sdk-native-${{ hashFiles('sdks/node/native/Cargo.lock', 'sdks/node/native/src/**') }}
          restore-keys: |
            ${{ runner.os }}-sdk-native-

      - name: Build graphene-worker binary
        run: cargo build --bin graphene-worker --release
        working-directory: crates/node

      - name: Install root dependencies
        run: bun install

      - name: Build Graphene Anchor program
        if: steps.kvm.outputs.available == 'true'
        working-directory: programs/graphene
        run: |
          bun anchor build
          echo "Program built at:"
          ls -la target/deploy/

      - name: Install native SDK dependencies
        working-directory: sdks/node/native
        run: bun install

      - name: Build native SDK
        working-directory: sdks/node/native
        run: bun run build

      - name: Install TypeScript SDK dependencies
        working-directory: sdks/node
        run: bun install

      - name: Build TypeScript SDK
        working-directory: sdks/node
        run: bun run build

      - name: Run all E2E Tests
        working-directory: sdks/node
        run: |
          export GRAPHENE_KERNEL_CACHE="$HOME/.graphene/cache/kernels"
          echo "Kernel cache path: $GRAPHENE_KERNEL_CACHE"
          ls -la "$GRAPHENE_KERNEL_CACHE" || echo "Kernel cache directory is empty or doesn't exist"
          bun test ./tests/*.e2e.test.ts --timeout ${{ inputs.timeout_seconds }}000
        env:
          GRAPHENE_WORKER_BINARY: ${{ github.workspace }}/target/release/graphene-worker
          KVM_AVAILABLE: ${{ steps.kvm.outputs.available }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            sdks/node/.graphene-test-*
            /tmp/graphene-test-*
          if-no-files-found: ignore
          retention-days: 7
