name: Build Node OS (Buildroot Prototype)

on:
  push:
    paths:
      - 'node-os/buildroot/**'
      - '.github/workflows/node-os-buildroot.yml'
  pull_request:
    paths:
      - 'node-os/buildroot/**'
  workflow_dispatch:
    inputs:
      skip_cache:
        description: 'Skip build cache'
        required: false
        type: boolean
        default: false

env:
  BUILDROOT_VERSION: "2024.02.1"

jobs:
  build:
    runs-on: ubicloud-standard-8
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]  # aarch64 support planned for Phase 1
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev \
            bc \
            cpio \
            unzip \
            rsync \
            wget \
            file \
            python3 \
            qemu-system-x86

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        if: ${{ !inputs.skip_cache }}
        with:
          path: ~/.buildroot-dl
          key: buildroot-dl-${{ env.BUILDROOT_VERSION }}-${{ matrix.arch }}

      - name: Cache ccache
        uses: actions/cache@v4
        if: ${{ !inputs.skip_cache }}
        with:
          path: ~/.buildroot-ccache
          key: buildroot-ccache-${{ env.BUILDROOT_VERSION }}-${{ matrix.arch }}-${{ hashFiles('node-os/buildroot/**') }}
          restore-keys: |
            buildroot-ccache-${{ env.BUILDROOT_VERSION }}-${{ matrix.arch }}-

      - name: Download Buildroot
        run: |
          wget -q "https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.gz"
          tar xzf "buildroot-${BUILDROOT_VERSION}.tar.gz"
          mv "buildroot-${BUILDROOT_VERSION}" buildroot

      - name: Configure Buildroot
        run: |
          cd buildroot
          make BR2_EXTERNAL="${GITHUB_WORKSPACE}/node-os/buildroot/external" graphene_node_defconfig
          # Set download and ccache directories
          echo "BR2_DL_DIR=\"${HOME}/.buildroot-dl\"" >> .config
          echo "BR2_CCACHE_DIR=\"${HOME}/.buildroot-ccache\"" >> .config

      - name: Build rootfs image
        run: |
          cd buildroot
          make -j$(nproc)

      - name: Verify shell removal
        run: |
          echo "=== Checking for shell binaries in rootfs ==="
          # Mount the ext4 image and check
          mkdir -p /tmp/rootfs
          sudo mount -o loop,ro buildroot/output/images/rootfs.ext4 /tmp/rootfs

          SHELLS_FOUND=0
          for shell in sh bash ash hush zsh; do
            if [ -f "/tmp/rootfs/bin/${shell}" ] || [ -f "/tmp/rootfs/usr/bin/${shell}" ]; then
              echo "ERROR: Shell found: ${shell}"
              SHELLS_FOUND=1
            fi
          done

          echo "=== Process list capabilities ==="
          ls -la /tmp/rootfs/bin/ || true

          sudo umount /tmp/rootfs

          if [ $SHELLS_FOUND -eq 1 ]; then
            echo "FAIL: Shell binaries found in rootfs"
            exit 1
          fi
          echo "PASS: No shell binaries in rootfs"

      - name: Check image size
        run: |
          SIZE=$(stat -c%s buildroot/output/images/rootfs.ext4)
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"

          if [ $SIZE_MB -gt 50 ]; then
            echo "WARNING: Image size exceeds 50MB target"
          else
            echo "PASS: Image size under 50MB target"
          fi

      - name: Boot test with QEMU
        if: matrix.arch == 'x86_64'
        run: |
          echo "=== Attempting QEMU boot test ==="

          # Check for KVM support
          if [ -e /dev/kvm ]; then
            echo "KVM available, using hardware acceleration"
            KVM_FLAG="-enable-kvm"
          else
            echo "KVM not available, using software emulation (slower)"
            KVM_FLAG=""
          fi

          # Boot the image and capture early boot logs
          timeout 60 qemu-system-x86_64 \
            $KVM_FLAG \
            -m 512 \
            -kernel buildroot/output/images/bzImage \
            -drive file=buildroot/output/images/rootfs.ext4,format=raw \
            -append "root=/dev/sda console=ttyS0 panic=1" \
            -nographic \
            -serial mon:stdio \
            2>&1 | tee boot.log || true

          # Check for successful boot indicators
          if grep -q "graphene-node" boot.log; then
            echo "PASS: System booted and attempted to start graphene-node"
          elif grep -q "Starting" boot.log; then
            echo "INFO: System booted, init scripts running"
          else
            echo "WARNING: Could not confirm full boot sequence"
          fi

      - name: Generate build info
        run: |
          cat > build-info.json << EOF
          {
            "buildroot_version": "${{ env.BUILDROOT_VERSION }}",
            "arch": "${{ matrix.arch }}",
            "image_size_bytes": $(stat -c%s buildroot/output/images/rootfs.ext4),
            "kernel_version": "$(cat buildroot/output/build/linux-*/.config 2>/dev/null | grep 'Linux.*Kernel Configuration' | head -1 || echo 'unknown')",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_sha": "${{ github.sha }}"
          }
          EOF
          cat build-info.json

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphene-node-os-buildroot-${{ matrix.arch }}
          path: |
            buildroot/output/images/rootfs.ext4
            buildroot/output/images/bzImage
            build-info.json
          retention-days: 30

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: node-os-prototype-${{ github.sha }}
          name: Node OS Prototype (Buildroot)
          body: |
            Buildroot-based prototype of Graphene Node OS.

            **This is a prototype for architecture validation - not for production use.**

            ## Features
            - Minimal Linux host OS
            - Shell-less (no /bin/sh, /bin/bash)
            - BusyBox init with essential utilities only
            - Firecracker binary included

            ## Image Details
            - Target size: <50MB
            - Init system: BusyBox
            - Kernel: Linux 6.6.x (minimal config)

            Built with Buildroot ${{ env.BUILDROOT_VERSION }}
          files: |
            artifacts/**/*
          draft: false
          prerelease: true
