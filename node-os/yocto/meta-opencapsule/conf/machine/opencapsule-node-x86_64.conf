#@TYPE: Machine
#@NAME: OpenCapsule Node x86_64
#@DESCRIPTION: Machine configuration for OpenCapsule Network Node (x86_64)

# CPU architecture
DEFAULTTUNE = "core2-64"
require conf/machine/include/x86/tune-core2.inc
require conf/machine/include/x86/x86-base.inc

# Kernel - linux-yocto compatible with this machine
PREFERRED_PROVIDER_virtual/kernel = "linux-yocto"
KERNEL_IMAGETYPE = "bzImage"
COMPATIBLE_MACHINE:opencapsule-node-x86_64 = "opencapsule-node-x86_64"

# Bootloader (UEFI)
EFI_PROVIDER = "grub-efi"
MACHINE_FEATURES += "efi"

# Serial console for debugging
SERIAL_CONSOLES = "115200;ttyS0"

# Rootfs type
IMAGE_FSTYPES = "wic wic.gz ext4"

# WIC configuration
WKS_FILE = "opencapsule-node.wks"

# KVM/Firecracker host features
MACHINE_FEATURES += "kvm"
MACHINE_EXTRA_RRECOMMENDS += "kernel-module-kvm kernel-module-kvm-intel kernel-module-kvm-amd"

# Virtio support for guest networking
MACHINE_EXTRA_RRECOMMENDS += "kernel-module-tun kernel-module-veth"

# dm-verity support
MACHINE_EXTRA_RRECOMMENDS += "kernel-module-dm-verity"

# No graphics
MACHINE_FEATURES:remove = "x11 wayland"

# Image size constraints
IMAGE_ROOTFS_SIZE = "51200"
IMAGE_OVERHEAD_FACTOR = "1.3"
