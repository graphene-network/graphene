# OpenCapsule Security Kernel Configuration Fragment
# SPDX-License-Identifier: Apache-2.0
#
# Additional security hardening options applied via KERNEL_FEATURES

#
# Memory protections
#
CONFIG_PAGE_TABLE_ISOLATION=y
CONFIG_RETPOLINE=y
CONFIG_X86_SMAP=y
CONFIG_X86_SMEP=y
CONFIG_X86_UMIP=y

#
# Kernel hardening
#
CONFIG_HARDENED_USERCOPY=y
CONFIG_FORTIFY_SOURCE=y
CONFIG_STRICT_KERNEL_RWX=y
CONFIG_STRICT_MODULE_RWX=y
CONFIG_DEBUG_WX=y
CONFIG_INIT_ON_ALLOC_DEFAULT_ON=y
CONFIG_INIT_ON_FREE_DEFAULT_ON=y

#
# Stack protection
#
CONFIG_STACKPROTECTOR=y
CONFIG_STACKPROTECTOR_STRONG=y
CONFIG_GCC_PLUGIN_STACKLEAK=y
CONFIG_SCHED_STACK_END_CHECK=y

#
# Restrict access to kernel memory
#
CONFIG_SECURITY_DMESG_RESTRICT=y
CONFIG_PROC_KCORE=n
CONFIG_KEXEC=n
CONFIG_HIBERNATION=n

#
# BPF hardening
#
CONFIG_BPF_JIT_ALWAYS_ON=y
CONFIG_BPF_UNPRIV_DEFAULT_OFF=y

#
# Restrict module loading (consider for hardened builds)
#
# CONFIG_MODULE_SIG=y
# CONFIG_MODULE_SIG_FORCE=y

#
# Disable legacy/unsafe features
#
CONFIG_COMPAT_VDSO=n
CONFIG_LEGACY_VSYSCALL_NONE=y
CONFIG_X86_VSYSCALL_EMULATION=n
CONFIG_MODIFY_LDT_SYSCALL=n

#
# seccomp (critical for Firecracker)
#
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

#
# Audit support
#
CONFIG_AUDIT=y
CONFIG_AUDITSYSCALL=y

#
# Additional protections
#
CONFIG_SLAB_FREELIST_RANDOM=y
CONFIG_SLAB_FREELIST_HARDENED=y
CONFIG_SHUFFLE_PAGE_ALLOCATOR=y
