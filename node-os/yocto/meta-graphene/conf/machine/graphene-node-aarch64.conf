#@TYPE: Machine
#@NAME: Graphene Node aarch64
#@DESCRIPTION: Machine configuration for Graphene Network Node (aarch64)

# CPU architecture
DEFAULTTUNE = "cortexa72"
require conf/machine/include/arm/armv8a/tune-cortexa72.inc

# Kernel - linux-yocto compatible with this machine
PREFERRED_PROVIDER_virtual/kernel = "linux-yocto"
KERNEL_IMAGETYPE = "Image"
COMPATIBLE_MACHINE:graphene-node-aarch64 = "graphene-node-aarch64"

# Bootloader (UEFI)
EFI_PROVIDER = "grub-efi"
MACHINE_FEATURES += "efi"

# Serial console for debugging
SERIAL_CONSOLES = "115200;ttyAMA0"

# Rootfs type
IMAGE_FSTYPES = "wic wic.gz ext4"

# WIC configuration
WKS_FILE = "graphene-node-arm64.wks"

# KVM/Firecracker host features
MACHINE_FEATURES += "kvm"
MACHINE_EXTRA_RRECOMMENDS += "kernel-module-kvm"

# Virtio support for guest networking
MACHINE_EXTRA_RRECOMMENDS += "kernel-module-tun kernel-module-veth"

# dm-verity support
MACHINE_EXTRA_RRECOMMENDS += "kernel-module-dm-verity"

# No graphics
MACHINE_FEATURES:remove = "x11 wayland"

# Image size constraints
IMAGE_ROOTFS_SIZE = "51200"
IMAGE_OVERHEAD_FACTOR = "1.0"
