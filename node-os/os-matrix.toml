# OpenCapsule Node OS Version Matrix
# Defines build system configuration and target versions

[build]
# Build system (Yocto for production)
system = "yocto"
yocto_version = "whinlatter"

[versions]
# Component versions
node_binary = "0.1.0"
firecracker = "1.11.0"
linux_kernel = "6.16"
linux_kernel_branch = "v6.16/standard/base"
rust = "1.93.0"  # Requires meta-rust-bin layer; must support Cargo.lock v4 (1.78+)

[defaults]
# Security defaults
dm_verity = false      # Enable in Phase 2
shell_enabled = false  # Always disabled
tpm_attestation = false  # Enable in Phase 2

# Image constraints
max_image_size_mb = 50

[targets.x86_64]
enabled = true
machine = "opencapsule-node-x86_64"

[targets.aarch64]
enabled = false  # Enable in Phase 2
machine = "opencapsule-node-aarch64"

[variants.minimal]
# Minimal variant for production
description = "Production-ready minimal image"
packages = ["opencapsule-node", "firecracker", "kmod"]
features = []

[variants.debug]
# Debug variant for development
description = "Development image with debugging tools"
packages = ["opencapsule-node", "firecracker", "kmod", "strace"]
features = ["debug-kernel"]
shell_enabled = false  # Still no shell, use serial console only
