pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy-fix:
      glob: "*.rs"
      run: cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features -- -D warnings
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    test:
      glob: "*.rs"
      run: cargo test --lib --bins
    test-doc:
      glob: "*.rs"
      run: cargo test --doc
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features -- -D warnings
